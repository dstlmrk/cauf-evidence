<div class="modal-content">
    <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-person-plus text-primary me-2"></i>Add member</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>
    <div class="modal-body">
        {% load crispy_forms_tags %}
        {% include "members/partials/member_search.html" %}
        <form
            id="addMemberToInternationalRosterForm"
            hx-post="{% url 'international_tournaments:roster_add' team_at_tournament_id %}"
            hx-disabled-elt="closest .modal-content find button[type='submit']"
        >
            {% csrf_token %}
            {{ form.member_id }}
            <div class="form-group">
                {% if form.member_id.errors %}
                    <div class="form-error-msg">
                        {% for error in form.member_id.errors %}
                            <p>{{ error }}</p>
                        {% endfor %}
                    </div>
                {% endif %}
            </div>
        </form>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button
            type="submit"
            class="btn btn-primary"
            form="addMemberToInternationalRosterForm"
            disabled
            x-data
            x-init="document.querySelector('#id_member_id')?.closest('form')?.addEventListener('change', (e) => { if (e.target.id === 'id_member_id') $el.disabled = !e.target.value })"
        >
            Submit
        </button>
    </div>
</div>
