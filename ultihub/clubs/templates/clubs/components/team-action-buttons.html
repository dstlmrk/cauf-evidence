{% if not team.is_primary %}
    <div class="d-flex gap-2 justify-content-end">
        <button class="btn btn-sm btn-secondary" hx-get="{% url 'clubs:edit_team' team.id %}" hx-target="#dialog">
            <i class="bi bi-pencil me-1"></i> Edit
        </button>
        <button
            class="btn btn-sm btn-danger"
            hx-post="{% url 'clubs:remove_team' team.id %}"
            hx-trigger="click"
            hx-confirm="Do you really want to remove this team?"
            hx-vals='{"team_id": "{{ team.id }}"}'
            hx-swap="none"
        >
            <i class="bi bi-trash me-1"></i> Remove
        </button>
    </div>
{% endif %}
