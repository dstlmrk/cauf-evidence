<span
    {% if transfer.state == 1 %}
        class="badge badge-soft-warning"
    {% elif transfer.state == 2 %}
        class="badge badge-soft-success"
    {% elif transfer.state == 5 %}
        class="badge badge-soft-secondary"
    {% else %}
        class="badge badge-soft-danger"
    {% endif %}
>
    {{ transfer.get_state_display | upper }}
</span>
