{% load crispy_forms_tags %}

<form hx-post="{% url 'members:export_members_csv_for_nsa' %}" class="modal-content">
    {% csrf_token %}
    <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-box-arrow-up"></i> NSA Export</h5>
    </div>
    <div class="modal-body">
        <div class="alert alert-light border d-flex align-items-center mb-3" role="alert">
            <i class="bi bi-envelope me-2"></i>
            <span>The CSV file will be sent to your email address <strong>{{ user.email }}</strong>.</span>
        </div>
        <label for="seasonSelect" class="form-label">Season</label>
        <select id="seasonSelect" name="season_id" class="form-select" required>
            <option value="">Choose a season</option>
            {% for season in seasons %}
                <option value="{{ season.id }}" {% if season.id == last_season.id %}selected{% endif %}>
                    {{ season.name }}
                </option>
            {% endfor %}
        </select>
        <div class="form-text">Member data for the selected season will be exported.</div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-primary"><i class="bi bi-envelope"></i> Send Export</button>
    </div>
</form>
