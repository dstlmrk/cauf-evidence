fail_fast: true
repos:
  - repo: local
    hooks:
      - id: lint
        name: lint
        entry: uv run poe lint
        language: system
        types: [file, python]
      - id: style
        name: style
        entry: uv run poe style
        pass_filenames: false
        language: system
        types: [file, python]
      - id: prettier
        name: prettier
        entry: npx prettier --check
        language: system
        types_or: [javascript, css, scss, html, yaml, json, markdown]
      # mypy is slow over the whole repo; run it on push instead of on every commit.
      - id: type
        name: type
        entry: uv run poe type
        pass_filenames: false
        language: system
        types: [file, python]
        stages: [pre-push]
